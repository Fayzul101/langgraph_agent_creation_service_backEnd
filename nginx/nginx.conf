worker_processes 1;
pid /Users/macbookair1/langgraph_console_backend/nginx/temp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /Users/macbookair1/langgraph_console_backend/nginx/temp/client_body;
    proxy_temp_path /Users/macbookair1/langgraph_console_backend/nginx/temp/proxy;
    fastcgi_temp_path /Users/macbookair1/langgraph_console_backend/nginx/temp/fastcgi;
    uwsgi_temp_path /Users/macbookair1/langgraph_console_backend/nginx/temp/uwsgi;
    scgi_temp_path /Users/macbookair1/langgraph_console_backend/nginx/temp/scgi;

    upstream kb_service {
        server 127.0.0.1:8000;
    }

    upstream agent_api {
        server 127.0.0.1:8001;
    }

    server {
        listen 8080;
        server_name localhost;

        location /kb_service/ {
            proxy_pass http://kb_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /agent_api/ {
            proxy_pass http://agent_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}